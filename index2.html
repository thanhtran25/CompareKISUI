<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Reconciliation Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #16a34a;
            --success-bg: #f0fdf4;
            --success-border: #86efac;
            --danger: #dc2626;
            --danger-bg: #fef2f2;
            --danger-border: #fca5a5;
            --warn: #d97706;
            --warn-bg: #fffbeb;
            --warn-border: #fcd34d;
            --bg: #e8eef6;
            --surface: #ffffff;
            --border: #dde4ef;
            --text: #0f172a;
            --text-secondary: #4b5a6e;
            --text-muted: #94a3b8;
            --radius: 12px;
            --shadow-sm: 0 1px 2px rgba(15,23,42,0.05), 0 1px 4px rgba(15,23,42,0.04);
            --shadow: 0 2px 6px rgba(15,23,42,0.07), 0 4px 16px rgba(15,23,42,0.06), 0 0 0 1px rgba(15,23,42,0.04);
            --shadow-lg: 0 8px 24px rgba(15,23,42,0.12), 0 20px 48px rgba(15,23,42,0.08), 0 0 0 1px rgba(15,23,42,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Geist', system-ui, sans-serif;
            background: linear-gradient(160deg, #e4ecf7 0%, #edf1f8 40%, #e8edf5 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            font-size: 15px;
        }

        .container { max-width: 1280px; margin: 0 auto; padding: 28px 24px 64px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 28px;
        }

        .header-left h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.6px; }
        .header-left p { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }

        .header-right { display: flex; gap: 10px; align-items: center; }

        .date-badge {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(15,23,42,0.09);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            box-shadow: 0 1px 2px rgba(15,23,42,0.05);
        }

        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px; border-radius: 8px; font-size: 13px;
            font-weight: 600; border: none; cursor: pointer; transition: all .15s;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled { opacity: .55; cursor: not-allowed; }

        /* ── Summary ── */
        .summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 28px; }
        .summary-card {
            background: var(--surface);
            border: 1px solid rgba(15,23,42,0.06);
            border-radius: var(--radius);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: var(--shadow);
            transition: transform .15s, box-shadow .15s;
        }
        .summary-icon {
            width: 42px; height: 42px; border-radius: 10px;
            display: grid; place-items: center; font-size: 18px; flex-shrink: 0;
        }
        .summary-icon.total { background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 100%); color: var(--primary); }
        .summary-icon.pass  { background: linear-gradient(135deg, #dcfce7 0%, #f0fdf4 100%); color: var(--success); }
        .summary-icon.fail  { background: linear-gradient(135deg, #fee2e2 0%, #fef2f2 100%); color: var(--danger); }
        .summary-info .label {
            font-size: 12px; font-weight: 500; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: .4px;
        }
        .summary-info .value { font-size: 28px; font-weight: 800; line-height: 1.1; letter-spacing: -1px; }

        /* ── Platform Section ── */
        .platform-section { margin-bottom: 24px; }
        .platform-section:last-child { margin-bottom: 0; }

        .table-card {
            background: var(--surface);
            border: 1px solid rgba(15,23,42,0.06);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: box-shadow .15s;
        }
        .table-card-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(180deg, #f8faff 0%, #ffffff 100%);
        }
        .table-card-header h2 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }

        .platform-tag {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 12px; border-radius: 6px; font-size: 11px;
            font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
        }
        .platform-tag.wts  { background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 100%); color: var(--primary); border: 1px solid #93c5fd; box-shadow: 0 1px 3px rgba(37,99,235,0.12); }
        .platform-tag.ikis { background: linear-gradient(135deg, #ede9fe 0%, #f5f3ff 100%); color: #7c3aed; border: 1px solid #c4b5fd; box-shadow: 0 1px 3px rgba(124,58,237,0.12); }

        /* ── Table ── */
        .recon-table { width: 100%; border-collapse: collapse; }
        .recon-table th, .recon-table td {
            padding: 10px 16px; font-size: 13px; text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .recon-table thead th {
            background: linear-gradient(180deg, #f5f8ff 0%, #f0f4fb 100%);
            font-weight: 700; color: var(--text-secondary);
            font-size: 11.5px; text-transform: uppercase; letter-spacing: .5px;
            border-bottom: 2px solid var(--border);
        }
        .recon-table tbody tr { transition: background .1s; }
        .recon-table tbody tr:hover { background: #f0f5ff; }
        .recon-table tbody tr:last-child td { border-bottom: none; }
        .market-name { text-align: left !important; font-weight: 600; width: 130px; }

        /* ── Badges ── */
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 11px; border-radius: 8px; font-size: 12px;
            font-weight: 700; line-height: 1; letter-spacing: 0.1px;
        }
        .badge-ok { background: linear-gradient(135deg, #dcfce7 0%, #f0fdf4 100%); color: #15803d; border: 1px solid #86efac; }
        .badge-fail {
            background: linear-gradient(135deg, #fee2e2 0%, #fef2f2 100%);
            color: #dc2626; border: 1px solid var(--danger-border);
            cursor: pointer; transition: all .15s;
            box-shadow: 0 1px 3px rgba(220,38,38,0.12);
        }
        .badge-fail:hover {
            background: linear-gradient(135deg, #fecaca 0%, #fee2e2 100%);
            border-color: #f87171;
            box-shadow: 0 2px 6px rgba(220,38,38,0.2);
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(15,23,42,.45); backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; align-items: center; justify-content: center; animation: fadeIn .15s; }
        @keyframes fadeIn { from { opacity: 0 } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px) } }

        .modal {
            background: var(--surface); width: 90%; max-width: 580px;
            border-radius: 16px; overflow: hidden; animation: slideUp .2s ease;
            max-height: 85vh; display: flex; flex-direction: column;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(15,23,42,0.05);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 22px; border-bottom: 1px solid var(--border); flex-shrink: 0;
            background: linear-gradient(180deg, #f8faff 0%, #ffffff 100%);
        }
        .modal-header h3 { font-size: 17px; font-weight: 700; }
        .modal-context { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }

        .close-btn {
            width: 32px; height: 32px; border-radius: 8px;
            border: 1px solid var(--border); background: transparent;
            display: grid; place-items: center; cursor: pointer;
            font-size: 18px; color: var(--text-secondary); transition: all .1s;
        }
        .close-btn:hover { background: #f1f5f9; color: var(--text); }

        .modal-scroll { overflow-y: auto; flex: 1; }

        .modal-body { padding: 18px 22px; display: flex; flex-direction: column; gap: 12px; }
        .missing-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .missing-row > .error-panel { min-width: 0; }

        /* ── Error Panel ── */
        .error-panel {
            background: #f8fafc; border: 1px solid rgba(15,23,42,0.07);
            border-radius: 10px; overflow: hidden;
        }
        .error-panel-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; border-bottom: 1px solid var(--border);
        }
        .error-panel-title {
            font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px;
        }
        .error-panel-title .count {
            min-width: 20px; height: 18px; padding: 0 6px;
            border-radius: 9px; font-size: 11px; font-weight: 700;
            display: inline-flex; align-items: center; justify-content: center;
        }

        .panel-source .error-panel-title { color: var(--danger); }
        .panel-source .count { background: var(--danger-bg); color: var(--danger); }

        .panel-kis .error-panel-title { color: var(--warn); }
        .panel-kis .count { background: var(--warn-bg); color: var(--warn); }

        .panel-mismatch .error-panel-title { color: var(--primary); }
        .panel-mismatch .count { background: #eff6ff; color: var(--primary); }

        .btn-copy {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: 6px; font-size: 11px;
            font-weight: 600; border: 1px solid var(--border); background: var(--surface);
            cursor: pointer; color: var(--text-secondary); transition: all .15s;
        }
        .btn-copy:hover { background: #f1f5f9; color: var(--text); }
        .btn-copy.copied { background: var(--success-bg); color: var(--success); border-color: var(--success-border); }

        .symbol-list {
            list-style: none; padding: 10px 14px;
            display: flex; flex-direction: column; gap: 2px;
        }
        .symbol-list li {
            font-size: 13px; font-weight: 600;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            color: var(--text); padding: 4px 8px; border-radius: 4px;
        }
        .symbol-list li:hover { background: #e2e8f0; }
        .symbol-list .empty {
            font-family: inherit; font-weight: 500; color: var(--text-muted);
        }
        .symbol-list .empty:hover { background: transparent; }

        /* mismatch table */
        .mismatch-table { width: 100%; border-collapse: collapse; }
        .mismatch-table th, .mismatch-table td {
            padding: 6px 14px; font-size: 12px; text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .mismatch-table thead th {
            background: #f1f5f9; font-weight: 600; color: var(--text-secondary);
            font-size: 11px; text-transform: uppercase; letter-spacing: .3px;
        }
        .mismatch-table tbody tr:last-child td { border-bottom: none; }
        .mismatch-table .mono {
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            font-weight: 600;
        }

        .modal-footer {
            padding: 14px 22px; border-top: 1px solid var(--border);
            text-align: right; flex-shrink: 0;
        }
        .btn-secondary {
            padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); font-size: 13px; font-weight: 600;
            cursor: pointer; color: var(--text-secondary); transition: all .1s;
        }
        .btn-secondary:hover { background: #f1f5f9; color: var(--text); }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
            border-radius: 50%; animation: spin .5s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg) } }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }

        .badge-pending {
            background: var(--warn-bg); color: #b45309; border: 1px solid var(--warn-border);
            position: relative; overflow: hidden;
        }
        .badge-pending::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(245,158,11,.18) 40%, rgba(245,158,11,.28) 50%, rgba(245,158,11,.18) 60%, transparent 100%);
            animation: shimmer 1.5s ease-in-out infinite;
        }
        @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

        .ssi-notice {
            background: linear-gradient(135deg, #fffbeb 0%, #fef9e7 100%);
            border: 1px solid var(--warn-border);
            border-radius: var(--radius); padding: 12px 18px;
            font-size: 13px; font-weight: 500; color: #92400e;
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 1px 3px rgba(217,119,6,0.1);
        }

        /* ── Smooth transitions ── */
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: none } }
        .fade-in { animation: fadeSlideIn .3s ease both; }
        .platform-section:nth-child(2) { animation-delay: .05s; }
        .platform-section:nth-child(3) { animation-delay: .1s; }
        .summary-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .recon-table tbody tr { animation: fadeSlideIn .2s ease both; }
        .recon-table tbody tr:nth-child(n) { animation-delay: calc(var(--row, 0) * 25ms); }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .container { padding: 16px 12px; }

            header { flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
            .header-left h1 { font-size: 18px; }
            .header-right { width: 100%; justify-content: space-between; }

            .summary { grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
            .summary-card { padding: 14px 16px; gap: 12px; }
            .summary-info .value { font-size: 22px; }
            .summary-icon { width: 36px; height: 36px; font-size: 16px; }

            .table-card { border-radius: 8px; }
            .table-card-header { padding: 12px 14px; }
            .table-card-header h2 { font-size: 14px; }

            .recon-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .recon-table { min-width: 480px; }
            .recon-table th, .recon-table td { padding: 8px 10px; font-size: 12px; white-space: nowrap; }
            .market-name { width: 100px; }

            .modal { width: 96%; max-height: 90vh; border-radius: 12px; }
            .modal-header { padding: 14px 16px; }
            .modal-header h3 { font-size: 15px; }
            .modal-body { padding: 14px 16px; gap: 10px; }
            .missing-row { grid-template-columns: 1fr; }

            .mismatch-table th, .mismatch-table td { padding: 5px 10px; font-size: 11px; }
            .modal-footer { padding: 12px 16px; }

            .ssi-notice { padding: 10px 14px; font-size: 12px; }

            .badge { font-size: 11px; padding: 3px 8px; }
        }

        @media (max-width: 480px) {
            .summary { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
            .summary-card { flex-direction: column; text-align: center; padding: 12px 8px; gap: 6px; }
            .summary-info .value { font-size: 20px; }
            .summary-info .label { font-size: 10px; }
            .summary-icon { width: 32px; height: 32px; font-size: 14px; border-radius: 8px; }

            .date-badge { padding: 5px 10px; font-size: 12px; }
            .btn { padding: 7px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-left" style="display:flex;align-items:center;gap:12px;">
            <a href="index.html" style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);text-decoration:none;transition:background .15s,border-color .15s;" onmouseover="this.style.background='var(--bg)';this.style.borderColor='var(--text-muted)'" onmouseout="this.style.background='var(--surface)';this.style.borderColor='var(--border)'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></a>
            <div>
                <h1>Data Reconciliation</h1>
                <p>KIS vs Third-party data comparison</p>
            </div>
        </div>
        <div class="header-right">
            <span class="date-badge" id="dateLabel">--</span>
            <button class="btn btn-primary" id="btnRun" onclick="runCompare()">Reload</button>
        </div>
    </header>

    <div class="summary" id="summary" style="display:none">
        <div class="summary-card">
            <div class="summary-icon total">&#9776;</div>
            <div class="summary-info"><div class="label">Total checks</div><div class="value" id="statTotal">0</div></div>
        </div>
        <div class="summary-card">
            <div class="summary-icon pass">&#10003;</div>
            <div class="summary-info"><div class="label">Passed</div><div class="value" id="statPass" style="color:var(--success)">0</div></div>
        </div>
        <div class="summary-card">
            <div class="summary-icon fail">&#10007;</div>
            <div class="summary-info"><div class="label">Failed</div><div class="value" id="statFail" style="color:var(--danger)">0</div></div>
        </div>
    </div>

    <div id="resultsContainer">
        <div class="table-card">
            <div id="tableContainer">
                <div class="empty-state">
                    <div class="icon">&#128202;</div>
                    <p>Click <strong>Run Compare</strong> to start reconciliation</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="errorModal">
    <div class="modal">
        <div class="modal-header">
            <div>
                <h3 id="modalTitle"></h3>
                <div class="modal-context" id="modalContext"></div>
            </div>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-scroll">
            <div class="modal-body" id="modalBody"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal()">Close</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:3000';
    let _pollTimer = null;

    function setDate() {
        const d = new Date();
        document.getElementById('dateLabel').textContent =
            d.toLocaleDateString('vi-VN', { weekday:'short', day:'2-digit', month:'2-digit', year:'numeric' });
    }
    setDate();

    function stopPolling() {
        if (_pollTimer) { clearTimeout(_pollTimer); _pollTimer = null; }
    }

    async function runCompare(isPolling = false) {
        const btn = document.getElementById('btnRun');
        if (!isPolling) {
            stopPolling();
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Loading...';
        }
        try {
            const res = await fetch(`${API_BASE}/brokers/compare`);
            const json = await res.json();

            if (!json.results) {
                stopPolling();
                document.getElementById('resultsContainer').innerHTML =
                    `<div class="table-card"><div class="empty-state"><div class="icon">&#128337;</div><p>${json.message || 'No data available.'}</p></div></div>`;
                document.getElementById('summary').style.display = 'none';
                return;
            }

            document.getElementById('dateLabel').textContent = json.date || '--';
            const hasPending = renderResults(json.results, json.ssiPending);

            if (hasPending) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Polling...';
                _pollTimer = setTimeout(() => runCompare(true), 2000);
            } else {
                stopPolling();
            }
        } catch (err) {
            stopPolling();
            document.getElementById('resultsContainer').innerHTML =
                `<div class="table-card"><div class="empty-state"><div class="icon">&#9888;</div><p>Failed to load: ${err.message}</p></div></div>`;
        } finally {
            if (!_pollTimer) {
                btn.disabled = false;
                btn.textContent = 'Reload';
            }
        }
    }

    function renderResults(data, ssiPending = false) {
        const sources = Object.keys(data);
        const platforms = ['WTS', 'iKIS'];
        const allMarkets = new Set();

        for (const src of sources)
            for (const plat of platforms)
                if (data[src]?.[plat])
                    Object.keys(data[src][plat]).forEach(m => allMarkets.add(m));

        const markets = [...allMarkets];
        let total = 0, pass = 0, fail = 0, pending = 0;

        let html = '';

        if (ssiPending) {
            html += '<div class="ssi-notice fade-in">\u23F3 SSI data ch\u01B0a download. Ch\u1EC9 hi\u1EC3n th\u1ECB k\u1EBFt qu\u1EA3 MAS.</div>';
        }

        for (const plat of platforms) {
            const tagClass = plat === 'WTS' ? 'wts' : 'ikis';
            html += '<div class="platform-section fade-in"><div class="table-card">';
            html += `<div class="table-card-header"><h2><span class="platform-tag ${tagClass}">${plat}</span></h2></div>`;
            html += '<div class="recon-table-wrap"><table class="recon-table"><thead><tr><th class="market-name">Market</th>';
            for (const src of sources) html += `<th>${src}</th>`;
            html += '</tr></thead><tbody>';

            markets.forEach((market, rowIdx) => {
                html += `<tr style="--row:${rowIdx}"><td class="market-name">${market}</td>`;
                for (const src of sources) {
                    const cell = data[src]?.[plat]?.[market];

                    if (data[src] === null || !cell || cell.status === 'pending') {
                        pending++;
                        html += '<td><span class="badge badge-pending">\u23F3 Pending</span></td>';
                        continue;
                    }

                    total++;
                    if (cell.status === true) {
                        pass++;
                        html += '<td><span class="badge badge-ok">\u2713 OK</span></td>';
                    } else {
                        fail++;
                        const f = cell.failures || {};
                        const count = (f.missing_in_source||[]).length + (f.missing_in_kis||[]).length + (f.value_mismatch||[]).length;
                        const payload = JSON.stringify({ market, src, plat, failures: f });
                        html += `<td><span class="badge badge-fail" onclick='showError(${payload.replace(/'/g,"&#39;")})'>`;
                        html += `\u2717 ${count} issue${count>1?'s':''}</span></td>`;
                    }
                }
                html += '</tr>';
            });
            html += '</tbody></table></div></div></div>';
        }

        document.getElementById('resultsContainer').innerHTML = html;
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statPass').textContent = pass;
        document.getElementById('statFail').textContent = fail;
        document.getElementById('summary').style.display = 'grid';

        return pending > 0;
    }

    function showError({ market, src, plat, failures }) {
        document.getElementById('modalTitle').textContent = market;
        document.getElementById('modalContext').textContent = `Platform: ${plat}  \u00b7  Source: ${src}`;

        const missingSource = [...(failures.missing_in_source || [])].sort();
        const missingKis = [...(failures.missing_in_kis || [])].sort();
        const mismatch = [...(failures.value_mismatch || [])].sort((a,b) => a.symbol.localeCompare(b.symbol));

        let body = '';

        if (missingSource.length || missingKis.length) {
            body += '<div class="missing-row">';
            body += missingSource.length
                ? buildSymbolPanel('panel-source', 'Missing in Source', missingSource)
                : '<div></div>';
            body += missingKis.length
                ? buildSymbolPanel('panel-kis', 'Missing in KIS', missingKis)
                : '<div></div>';
            body += '</div>';
        }
        if (mismatch.length) {
            body += '<div class="error-panel panel-mismatch">';
            body += `<div class="error-panel-header"><div class="error-panel-title">Value Mismatch <span class="count">${mismatch.length}</span></div>`;
            body += `<button class="btn-copy" onclick="copyList(this, '${mismatch.map(m=>m.symbol).join('\\n')}')">Copy</button></div>`;
            body += '<table class="mismatch-table"><thead><tr><th>Symbol</th><th>Field</th><th>Source</th><th>KIS</th></tr></thead><tbody>';
            for (const m of mismatch) {
                const d = m.differences || {};
                body += `<tr><td class="mono">${m.symbol}</td><td>${d.kisField||'-'}</td><td>${d.expected??'-'}</td><td>${d.actual??'-'}</td></tr>`;
            }
            body += '</tbody></table></div>';
        }

        document.getElementById('modalBody').innerHTML = body;
        document.getElementById('errorModal').classList.add('active');
    }

    function buildSymbolPanel(panelClass, title, items) {
        let html = `<div class="error-panel ${panelClass}">`;
        html += `<div class="error-panel-header"><div class="error-panel-title">${title} <span class="count">${items.length}</span></div>`;
        html += `<button class="btn-copy" onclick="copyList(this, '${items.join('\\n')}')">Copy</button></div>`;
        html += '<ul class="symbol-list">';
        html += items.map(s => `<li>${s}</li>`).join('');
        html += '</ul></div>';
        return html;
    }

    function copyList(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            btn.classList.add('copied');
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 1500);
        });
    }

    function closeModal() { document.getElementById('errorModal').classList.remove('active'); }

    window.addEventListener('click', e => { if (e.target === document.getElementById('errorModal')) closeModal(); });
    window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    runCompare();
</script>

</body>
</html>
